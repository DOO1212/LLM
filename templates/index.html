<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --primary: #1d4ed8;
            --primary-soft: #e8efff;
            --line: #e5eaf2;
            --text: #182230;
            --sub: #5f6b7a;
            --ok: #168039;
            --warn: #b45309;
            --danger: #b42318;
            --shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans KR", sans-serif;
        }

        .layout {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 16px 28px;
        }

        .field, select, button, textarea, input {
            border: 1px solid #d7deea;
            border-radius: 10px;
            font-family: inherit;
        }

        input, select, textarea {
            padding: 9px 10px;
            background: white;
            color: var(--text);
        }

        button {
            background: white;
            color: var(--sub);
            cursor: pointer;
            padding: 9px 12px;
            font-weight: 500;
        }
        button:hover { background: #f8fafc; color: var(--text); }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: #1940b2; color: white; }

        .tabs {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .main-content { margin-top: 14px; }
        .tab-btn {
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.86rem;
            border: 1px solid #cfd8e6;
            background: white;
            color: var(--sub);
        }
        .tab-btn.active {
            background: var(--primary-soft);
            border-color: #b8cbff;
            color: var(--primary);
            font-weight: 700;
        }

        .tab-panel { display: none; margin-top: 14px; }
        .tab-panel.active { display: block; }
        .hidden { display: none !important; }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 12px;
        }
        .col-12 { grid-column: span 12; }
        .col-8 { grid-column: span 8; }
        .col-6 { grid-column: span 6; }
        .col-4 { grid-column: span 4; }
        .col-3 { grid-column: span 3; }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px;
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 0.98rem;
        }
        .card-sub {
            margin: -4px 0 10px;
            color: var(--sub);
            font-size: 0.83rem;
        }

        .metric {
            display: flex;
            align-items: baseline;
            gap: 7px;
            margin-top: 10px;
        }
        .metric .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
        }
        .metric .label {
            font-size: 0.8rem;
            color: var(--sub);
        }

        .status-line {
            margin-top: 10px;
            font-size: 0.83rem;
            color: var(--sub);
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #f8fafc;
        }

        .score-hint {
            font-size: 0.78rem;
            color: var(--sub);
            margin-top: 2px;
        }

        .file-pills, .label-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .pill {
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #eef4ff;
            color: var(--primary);
            border: 1px solid #dbe7ff;
        }
        .pill.missing {
            background: #fff1f2;
            border-color: #ffd5db;
            color: var(--danger);
        }

        .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .toolbar input { flex: 1; min-width: 220px; }

        .result-box {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            margin-top: 8px;
            background: #fbfdff;
        }
        .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            background: #e8efff;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .progress-wrap {
            background: #edf1f7;
            border-radius: 6px;
            height: 6px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress { height: 100%; background: var(--primary); border-radius: 6px; width: 0%; }

        .answer {
            white-space: pre-wrap;
            line-height: 1.58;
            background: #f0f7ff;
            border-left: 4px solid #6ea8ff;
            border-radius: 0 8px 8px 0;
            padding: 10px 12px;
            margin-top: 10px;
            display: none;
        }

        .feedback-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }
        .feedback-buttons button {
            font-size: 0.9rem;
            padding: 6px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
        }
        .feedback-buttons button:hover:not(:disabled) {
            background: #f5f5f5;
        }
        .feedback-buttons button:disabled {
            opacity: 0.6;
            cursor: default;
        }
        .feedback-buttons .btn-like { border-color: #6ea8ff; color: #2563eb; }
        .feedback-buttons .btn-dislike { border-color: #c4b5b5; color: #6b7280; }
        .feedback-buttons .btn-like.selected { background: #dbeafe; }
        .feedback-buttons .btn-dislike.selected { background: #f3f4f6; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; padding: 20px; min-width: 320px; max-width: 90vw; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .modal-content h4 { margin: 0 0 14px 0; font-size: 1rem; }
        .dislike-reason-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .dislike-reason-options label { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--line); }
        .dislike-reason-options label:hover { background: #f5f5f5; }
        .dislike-reason-options input[type="radio"] { margin: 0; }
        .dislike-reason-other-wrap { margin-top: 6px; }
        .dislike-reason-other-wrap input { width: 100%; padding: 8px 10px; font-size: 0.9rem; border: 1px solid var(--line); border-radius: 6px; }
        .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .modal-buttons button { padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; }
        .modal-buttons .btn-cancel { background: #f3f4f6; border: 1px solid var(--line); }
        .modal-buttons .btn-confirm { background: var(--primary); color: #fff; border: none; }

        .button-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .button-row button { font-size: 0.8rem; padding: 6px 10px; }

        .toast {
            margin-top: 10px;
            border: 1px solid #b8e6c6;
            background: #ecfdf3;
            color: var(--ok);
            border-radius: 10px;
            padding: 10px 12px;
            display: none;
            font-size: 0.84rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.81rem;
            margin-top: 8px;
        }
        th, td {
            border-bottom: 1px solid #edf1f7;
            padding: 7px 8px;
            text-align: left;
            vertical-align: top;
        }
        th {
            color: var(--sub);
            background: #f8fafc;
            font-weight: 700;
        }
        tr:hover td { background: #fbfdff; }

        .inline-form {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
            align-items: center;
        }
        .inline-form input, .inline-form textarea, .inline-form select {
            width: 100%;
        }
        .inline-form textarea {
            min-height: 84px;
            resize: vertical;
        }

        .muted { color: var(--sub); font-size: 0.82rem; }
        .ok { color: var(--ok); font-weight: 700; }
        .danger { color: var(--danger); font-weight: 700; }
        .warn { color: var(--warn); font-weight: 700; }

        @media (max-width: 960px) {
            .col-8, .col-6, .col-4, .col-3 { grid-column: span 12; }
        }
    </style>
</head>
<body>
<div class="layout">
    <main class="main-content">
        <div class="grid">
            <div class="card col-12">
                <h3>업무 질문 및 답변</h3>
                <div class="toolbar">
                    <input id="user-input" type="text" placeholder="업무 질문을 입력하세요..." onkeypress="if(event.keyCode==13) askQuestion()">
                    <button class="btn-primary" onclick="askQuestion()">질문 실행</button>
                </div>
                <div id="chat-result" class="result-box" style="display:none;">
                    <div id="response-text"></div>
                    <div class="progress-wrap"><div id="score-bar" class="progress"></div></div>
                    <div id="clarification-box" class="status-line hidden">
                        <div id="clarification-text" style="margin-bottom:8px;"></div>
                        <div id="clarification-buttons" class="button-row"></div>
                    </div>
                    <div id="answer-text" class="answer"></div>
                    <div id="feedback-buttons" class="feedback-buttons" style="display:none;">
                        <button type="button" id="btn-like" class="btn-like" onclick="submitFeedback('like')">👍 좋아요</button>
                        <button type="button" id="btn-dislike" class="btn-dislike" onclick="onDislikeClick()">👎 싫어요</button>
                    </div>
                    <div id="dislike-reason-modal" class="modal-overlay">
                        <div class="modal-content">
                            <h4>싫어요 이유를 선택해주세요</h4>
                            <div class="dislike-reason-options">
                                <label><input type="radio" name="dislike-reason" value="답변이 틀려요"> 답변이 틀려요</label>
                                <label><input type="radio" name="dislike-reason" value="질문과 무관해요"> 질문과 무관해요</label>
                                <label><input type="radio" name="dislike-reason" value="정보가 부족해요"> 정보가 부족해요</label>
                                <label><input type="radio" name="dislike-reason" value="기타"> 기타</label>
                                <div class="dislike-reason-other-wrap" id="dislike-reason-other-wrap" style="display:none;">
                                    <input type="text" id="dislike-reason-other" placeholder="직접 입력 (선택)" maxlength="500">
                                </div>
                            </div>
                            <div class="modal-buttons">
                                <button type="button" class="btn-cancel" onclick="closeDislikeReasonModal()">취소</button>
                                <button type="button" class="btn-confirm" onclick="confirmDislikeReason()">확인</button>
                            </div>
                        </div>
                    </div>
                    <div id="quick-train-box" class="status-line" style="margin-top:8px; display:none;">
                        <!-- 분류 제거: 카테고리 표시/교정 비표시 -->
                        <div class="button-row">
                            <button onclick="submitCorrection('재고')">재고</button>
                            <button onclick="submitCorrection('생산')">생산</button>
                            <button onclick="submitCorrection('재무')">재무</button>
                            <button onclick="submitCorrection('규율')">규율</button>
                            <button onclick="submitCorrection('기타')">기타</button>
                        </div>
                    </div>
                </div>
                <div id="learn-toast" class="toast">
                    <div id="toast-msg"></div>
                    <div id="toast-pills" class="label-pills"></div>
                </div>
            </div>

            <div id="data-result-card" class="card col-12" style="display:none;">
                <h3>조회 데이터</h3>
                <div id="data-files-columns" class="muted" style="margin-bottom:10px; display:none;"></div>
                <div id="data-summary" class="muted">아직 조회된 데이터가 없습니다.</div>
                <div style="overflow:auto;">
                    <table>
                        <thead id="data-thead"></thead>
                        <tbody id="data-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

</div>

<script>
const AUTO_REASK_QUERY_KEY = "auto_reask_query";
const AUTO_VERIFY_CORRECTION_KEY = "auto_verify_correction";
let lastResult = null;
let lastQuery = null;
let currentFeedback = null;  /* null | 'like' | 'dislike' - 같은 버튼 다시 누르면 취소 */
let currentUser = null;

function escapeHtml(v) {
    return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
}

async function api(path, options = {}) {
    const opts = { ...options };
    opts.headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
    const res = await fetch(path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
        if (res.status === 401) throw new Error("로그인이 필요합니다.");
        throw new Error(data.error || "요청 실패");
    }
    return data;
}

function switchTab(_tab) {
    // 탭 제거됨: 챗봇·데이터 파일 상태만 표시
}

function renderWhoAmI(user) {
    currentUser = user;
    const whoami = document.getElementById("whoami");
    if (whoami) whoami.innerText = `${user.employee_id} / ${user.name} / ${user.role}`;
    applyRolePermissions();
}

function hasRole(...roles) {
    if (!currentUser || !currentUser.role) return false;
    return roles.includes(currentUser.role);
}

function applyRolePermissions() {
    // 역할별 UI 제한 (필요 시 추가)
}

async function ensureLoggedIn() {
    const meRes = await fetch("/auth/me");
    const me = await meRes.json();
    if (me.logged_in && me.user) {
        renderWhoAmI(me.user);
        return true;
    }
    /* 상단 로그인 폼 제거: 기본 계정으로 자동 로그인 */
    const data = await api("/auth/login", {
        method: "POST",
        body: JSON.stringify({ employee_id: "user1", name: "사용자", role: "user" })
    });
    renderWhoAmI(data.user);
    return true;
}

async function loadStats() {
    const data = await api("/stats");
    const learnedEl = document.getElementById("learned-count");
    if (learnedEl) learnedEl.innerText = data.learned_examples ?? 0;
}

function renderFileStatus(_data) {
    // 데이터 파일 상태 블록 제거됨
}

async function rescanFiles() {
    const statusEl = document.getElementById("rescan-status");
    const btn = document.getElementById("rescan-btn");
    if (statusEl) statusEl.innerText = "재스캔 중...";
    if (btn) btn.disabled = true;
    try {
        const data = await api("/rescan", { method: "POST" });
        renderFileStatus(data);
        const scannedAt = new Date().toLocaleTimeString("ko-KR");
        if (statusEl) {
            const count = data.count ?? (data.all_files && data.all_files.length) ?? Object.keys(data.files || {}).length;
            statusEl.innerText = `재스캔 완료 (${scannedAt}) - 감지 파일 ${count}개`;
        }
    } catch (e) {
        if (statusEl) statusEl.innerText = `재스캔 실패: ${e.message || "알 수 없는 오류"}`;
        alert(`데이터 재스캔 실패: ${e.message || "알 수 없는 오류"}`);
    } finally {
        if (btn) btn.disabled = false;
    }
}

async function toggleScanFilesList() {
    const wrap = document.getElementById("scan-files-list-wrap");
    const listEl = document.getElementById("scan-files-list");
    const btn = document.getElementById("scan-files-btn");
    if (wrap.style.display === "block") {
        wrap.style.display = "none";
        if (btn) btn.textContent = "스캔 파일 확인";
        return;
    }
    if (btn) btn.disabled = true;
    try {
        const data = await api("/files");
        const files = data.all_files || [];
        listEl.innerHTML = files.length
            ? `<div style="margin-top:6px;">총 ${files.length}개</div><ul style="margin:6px 0 0 16px; max-height:200px; overflow-y:auto;">${files.map((f) => `<li>${escapeHtml(f.filename)}</li>`).join("")}</ul>`
            : "<div style='margin-top:6px;'>스캔된 파일이 없습니다. 데이터 재스캔을 먼저 실행하세요.</div>";
        wrap.style.display = "block";
        if (btn) btn.textContent = "목록 접기";
    } catch (e) {
        listEl.innerHTML = "<div style='margin-top:6px; color:var(--error);'>목록을 불러오지 못했습니다.</div>";
        wrap.style.display = "block";
        if (btn) btn.textContent = "목록 접기";
    } finally {
        if (btn) btn.disabled = false;
    }
}

async function askQuestion(forcedQuery = null) {
    return askQuestionWithLabel(forcedQuery, null);
}

async function askQuestionWithLabel(forcedQuery = null, clarifiedLabel = null) {
    const query = (forcedQuery ?? document.getElementById("user-input").value).trim();
    if (!query) return;
    document.getElementById("user-input").value = query;

    const resultWrap = document.getElementById("chat-result");
    resultWrap.style.display = "block";
    document.getElementById("response-text").innerText = "요청 처리 중입니다...";
    document.getElementById("answer-text").style.display = "none";
    document.getElementById("quick-train-box").style.display = "none";
    document.getElementById("clarification-box").classList.add("hidden");
    document.getElementById("score-bar").style.width = "0%";
    document.getElementById("feedback-buttons").style.display = "none";

    const data = await api("/ask", {
        method: "POST",
        body: JSON.stringify({ query, clarified_label: clarifiedLabel })
    });
    const result = data.res || {};
    lastResult = result;
    lastQuery = query;

    if (result.status === "needs_clarification") {
        document.getElementById("response-text").innerText = "질문의 카테고리를 선택해주세요.";
        document.getElementById("clarification-text").innerText = result.question || "의도를 선택해주세요.";
        const candidates = result.candidates || [];
        document.getElementById("clarification-buttons").innerHTML = candidates
            .map((label) => {
                return `<button type="button" data-label="${escapeHtml(label)}" onclick="chooseClarificationFromEvent(event)">${escapeHtml(label)}</button>`;
            })
            .join("");
        document.getElementById("clarification-box").classList.remove("hidden");
        document.getElementById("answer-text").style.display = "none";
        document.getElementById("quick-train-box").style.display = "none";
        document.getElementById("data-result-card").style.display = "none";
        document.getElementById("data-files-columns").style.display = "none";
        document.getElementById("data-files-columns").innerHTML = "";
        document.getElementById("data-thead").innerHTML = "";
        document.getElementById("data-tbody").innerHTML = "";
        return;
    }

    const notes = [];
    if (result.clarified_label_applied) {
        notes.push(`<span class="muted">선택한 라벨이 우선 적용되었습니다.</span>`);
    }
    if (result.context_applied) {
        notes.push(`<span class="muted">이전 대화 맥락(${escapeHtml(result.context_label)})을 반영했습니다.</span>`);
    }
    if (result.context_query_expanded) {
        notes.push(`<span class="muted">후속 질문으로 판단되어 직전 질문의 핵심어를 함께 반영했습니다.</span>`);
    }
    document.getElementById("response-text").innerHTML = notes.join("<br>");
    const scorePct = Math.max(0, Math.min(100, Math.round((result.score || 0) * 100)));
    document.getElementById("score-bar").style.width = `${scorePct}%`;

    const answerEl = document.getElementById("answer-text");
    const feedbackEl = document.getElementById("feedback-buttons");
    const btnLike = document.getElementById("btn-like");
    const btnDislike = document.getElementById("btn-dislike");
    if (result.answer) {
        answerEl.style.display = "block";
        answerEl.innerText = result.answer;
        feedbackEl.style.display = "flex";
        currentFeedback = null;
        if (btnLike) { btnLike.disabled = false; btnLike.classList.remove("selected"); }
        if (btnDislike) { btnDislike.disabled = false; btnDislike.classList.remove("selected"); }
    } else {
        feedbackEl.style.display = "none";
    }
    document.getElementById("quick-train-box").style.display = "none";

    const columns = result.data?.columns || [];
    const rows = result.data?.rows || [];
    const allFilesColumns = result.data?.all_files_columns || [];
    const dataCardEl = document.getElementById("data-result-card");
    const filesColumnsEl = document.getElementById("data-files-columns");

    // 컬럼이 없을 때는 조회 데이터 영역 자체를 안 보여줌
    if (columns.length === 0) {
        dataCardEl.style.display = "none";
    } else {
        dataCardEl.style.display = "block";
        // 조회 결과 테이블이 있으면 파일별 컬럼 목록은 안 보여줌 (테이블에 이미 나옴)
        if (rows.length === 0 && allFilesColumns.length) {
            filesColumnsEl.style.display = "block";
            const title = allFilesColumns.length === 1
                ? "조회된 파일 (키워드에 맞는 파일만 표시)"
                : "data 폴더 파일별 컬럼 (1행 스캔)";
            filesColumnsEl.innerHTML = "<strong>" + title + "</strong><br>" +
                allFilesColumns.map((f) =>
                    `<span class="pill" style="margin:2px 4px 2px 0;">${escapeHtml(f.filename)}</span> ${(f.columns || []).map((c) => escapeHtml(c)).join(", ")}`
                ).join("<br>");
        } else {
            filesColumnsEl.style.display = "none";
            filesColumnsEl.innerHTML = "";
        }
        const summary = result.data?.summary || "조회된 데이터가 없습니다.";
        document.getElementById("data-summary").innerText = summary;
        document.getElementById("data-thead").innerHTML = `<tr>${columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
        document.getElementById("data-tbody").innerHTML = rows.map((row) => `<tr>${row.map((cell) => `<td>${escapeHtml(cell)}</td>`).join("")}</tr>`).join("");
    }
}

async function chooseClarification(label) {
    const query = document.getElementById("user-input").value.trim();
    if (!query || !label) return;
    await askQuestionWithLabel(query, label);
}

async function chooseClarificationFromEvent(event) {
    const label = event?.currentTarget?.dataset?.label || "";
    if (!label) return;
    await chooseClarification(label);
}

function onDislikeClick() {
    if (currentFeedback === "dislike") {
        submitFeedback("dislike");
        return;
    }
    openDislikeReasonModal();
}

function openDislikeReasonModal() {
    const modal = document.getElementById("dislike-reason-modal");
    const otherWrap = document.getElementById("dislike-reason-other-wrap");
    const otherInput = document.getElementById("dislike-reason-other");
    const radios = document.querySelectorAll('input[name="dislike-reason"]');
    if (radios.length) radios.forEach(r => { r.checked = false; });
    if (otherWrap) otherWrap.style.display = "none";
    if (otherInput) otherInput.value = "";
    if (modal) modal.classList.add("show");
}

function closeDislikeReasonModal() {
    const modal = document.getElementById("dislike-reason-modal");
    if (modal) modal.classList.remove("show");
}

function confirmDislikeReason() {
    const selected = document.querySelector('input[name="dislike-reason"]:checked');
    const otherInput = document.getElementById("dislike-reason-other");
    let reason = "";
    if (selected) {
        reason = selected.value === "기타" && otherInput && otherInput.value.trim()
            ? otherInput.value.trim()
            : selected.value;
    }
    closeDislikeReasonModal();
    submitFeedback("dislike", reason);
}

document.addEventListener("DOMContentLoaded", function() {
    const radios = document.querySelectorAll('input[name="dislike-reason"]');
    const otherWrap = document.getElementById("dislike-reason-other-wrap");
    radios.forEach(r => {
        r.addEventListener("change", function() {
            if (otherWrap) otherWrap.style.display = this.value === "기타" ? "block" : "none";
        });
    });
    document.getElementById("dislike-reason-modal")?.addEventListener("click", function(e) {
        if (e.target === this) closeDislikeReasonModal();
    });
});

async function submitFeedback(rating, optionalReason) {
    const query = lastQuery || document.getElementById("user-input")?.value?.trim() || "";
    const answer = lastResult?.answer || "";
    const reason = (rating === "dislike" && optionalReason) ? optionalReason : "";
    const btnLike = document.getElementById("btn-like");
    const btnDislike = document.getElementById("btn-dislike");
    if (!query) return;
    try {
        if (currentFeedback === rating) {
            await api("/chat-feedback", {
                method: "POST",
                body: JSON.stringify({ query, answer, rating: "cancel", cancel_rating: rating })
            });
            currentFeedback = null;
            if (btnLike) { btnLike.classList.remove("selected"); }
            if (btnDislike) { btnDislike.classList.remove("selected"); }
            return;
        }
        const body = { query, answer, rating };
        if (rating === "dislike" && reason) body.reason = reason;
        await api("/chat-feedback", {
            method: "POST",
            body: JSON.stringify(body)
        });
        currentFeedback = rating;
        if (btnLike) btnLike.classList.toggle("selected", rating === "like");
        if (btnDislike) btnDislike.classList.toggle("selected", rating === "dislike");
    } catch (e) {
        console.error("피드백 저장 실패:", e);
        alert("피드백 저장에 실패했습니다.");
    }
}

async function submitCorrection(label) {
    const query = document.getElementById("user-input").value.trim();
    if (!query) return;
    const data = await api("/correct", {
        method: "POST",
        body: JSON.stringify({ query, correct_label: label })
    });
    const learnedEl = document.getElementById("learned-count");
    if (learnedEl) learnedEl.innerText = data.learned_examples ?? 0;
    document.getElementById("toast-msg").innerHTML = `"${escapeHtml(query)}" → <strong>${escapeHtml(label)}</strong>로 반영했습니다.`;
    document.getElementById("toast-pills").innerHTML = Object.entries(data.label_counts || {})
        .map(([lbl, cnt]) => `<span class="pill">${escapeHtml(lbl)} ${cnt}개</span>`).join("");
    document.getElementById("learn-toast").style.display = "block";

    sessionStorage.setItem(AUTO_REASK_QUERY_KEY, query);
    sessionStorage.setItem(AUTO_VERIFY_CORRECTION_KEY, JSON.stringify({ query, label }));
    window.location.reload();
}

async function verifyLearningApplied(query, label) {
    const panel = document.getElementById("learning-verify-panel");
    if (!panel) return;
    panel.style.display = "block";
    panel.innerText = "학습 반영 확인 중...";
    try {
        const res = await api("/learning/verify", {
            method: "POST",
            body: JSON.stringify({ query, label })
        });
        if (res.learned) {
            panel.innerHTML = `✅ 학습 반영 완료: "${escapeHtml(query)}" → <strong>${escapeHtml(label)}</strong> (총 ${res.learned_examples}개 예시)`;
            panel.style.borderColor = "#b8e6c6";
            panel.style.background = "#ecfdf3";
            panel.style.color = "#168039";
        } else {
            panel.innerHTML = `⚠️ 아직 학습 데이터에서 확인되지 않았습니다: "${escapeHtml(query)}" → <strong>${escapeHtml(label)}</strong>`;
            panel.style.borderColor = "#ffe1b2";
            panel.style.background = "#fff8e8";
            panel.style.color = "#b45309";
        }
    } catch (e) {
        const reason = e?.message ? ` (${e.message})` : "";
        panel.innerText = `학습 반영 확인에 실패했습니다${reason}.`;
        panel.style.borderColor = "#ffd5db";
        panel.style.background = "#fff1f2";
        panel.style.color = "#b42318";
    }
}

async function refreshAll() {
    try {
        await Promise.all([
            loadStats(),
        ]);
    } catch (e) {
        console.error(e);
    }
}

(async function bootstrap() {
    try {
        await ensureLoggedIn();
        await refreshAll();

        const autoReaskQuery = sessionStorage.getItem(AUTO_REASK_QUERY_KEY);
        if (autoReaskQuery) {
            sessionStorage.removeItem(AUTO_REASK_QUERY_KEY);
            document.getElementById("user-input").value = autoReaskQuery;
            switchTab("chatbot");
            await askQuestion(autoReaskQuery);
        }

        const verifyRaw = sessionStorage.getItem(AUTO_VERIFY_CORRECTION_KEY);
        if (verifyRaw) {
            sessionStorage.removeItem(AUTO_VERIFY_CORRECTION_KEY);
            try {
                const verifyData = JSON.parse(verifyRaw);
                if (verifyData?.query && verifyData?.label) {
                    switchTab("chatbot");
                    await verifyLearningApplied(verifyData.query, verifyData.label);
                }
            } catch (e) {
                // ignore broken session payload
            }
        }
    } catch (e) {
        alert(e.message || "초기화 실패");
    }
})();
</script>
