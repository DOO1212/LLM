version: "3.9"

services:
  corpdesk-chatbot:
    build: .
    container_name: corpdesk-chatbot
    ports:
      - "8000:8000"
    environment:
      - APP_DB_PATH=/app/data/corpdesk.db
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./router_logs.jsonl:/app/router_logs.jsonl
      - ./clarified_training_dataset.jsonl:/app/clarified_training_dataset.jsonl
    restart: unless-stopped

